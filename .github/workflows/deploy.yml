name: Deploy Ai-cme FastAPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY_BASE64 }}" | base64 -d > key.pem
          chmod 600 key.pem

      - name: Test SSH connection
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=no \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo ✅ CONNECTED"

      - name: Deploy to server
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=no \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          set -e

          echo "=== Navigating to project ==="
          cd /var/www/Ai-cme

          echo "=== Repo status ==="
          git status

          echo "=== Fetch latest ==="
          git fetch origin main

          echo "=== Reset to origin/main ==="
          git checkout main
          git reset --hard origin/main

          echo "=== Install dependencies ==="
          /var/www/venv/bin/pip install -r /var/www/Ai-cme/adaptive_app/requirements.txt

          echo "=== Restart FastAPI ==="
          sudo systemctl restart fastapi

          echo "=== Service status ==="
          sudo systemctl status fastapi --no-pager

          echo "✅ DEPLOYMENT SUCCESSFUL"

          EOF
